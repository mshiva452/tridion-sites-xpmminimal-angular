<section id="newsroom" class="mx-auto" [attr.data-region]="region()?.name">
  <div class="container-fluid" >
    <h6 class="text-center py-4 my-3 text-uppercase newsroom-title position-relative">Newsroom</h6>
    <div class="row">
      <div class="col-md-9 p-0">
        @for (newsroomComponent of region()?.components; track newsroomComponent.id) {
          <headless-xpm-editor
            [tcmId]="'tcm:' + newsroomComponent.publicationId + '-' + newsroomComponent.itemId"
          >
            <div class="card-group h-100" [attr.data-component]="newsroomComponent.title">
              <div class="card h-100 border-0 rounded-0">
                <div class="h-100">
                  <img
                    class="card-img-top h-100 img-fluid"
                    [src]="newsroomComponent.image.variants.edges[0]?.node?.downloadUrl"
                    alt=""
                  />
                </div>
                <div class="card-body text-white p-0 m-0 bg-newsroom">
                  @for(article of newsroomComponent.articleBody;track article; let idx=$index){
                    <h6 class="card-title newsroom-heading p-3 m-3" [attr.xpm-editable-field-name]="article | fieldNamePipe:article?.content" [attr.xpm-editable-field-position]="idx" [innerHTML]="article?.content?.fragments?.[0]?.html">
                    </h6>
                  }
                </div>
              </div>
            </div>
          </headless-xpm-editor>
        }
      </div>
    </div>
  </div>
</section>
