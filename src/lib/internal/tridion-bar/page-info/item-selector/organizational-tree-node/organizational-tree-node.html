<div class="organizational-item-list" [class.active]="node.id === selectedNode()?.id" (click)="onSelect()">
    <svg (click)="toggleExpand($event)" [class.expanded]="node.expanded" version="1.1" fill="currentColor"
        preserveAspectRatio="xMidYMid meet" viewBox="0 0 16 16" width="1em" height="1em">
        <path
            d="M10.55268 7.56189L6.07923 3.18073c-.24603-.24097-.64868-.24097-.89471 0s-.24604.63525 0 .87622L9.21064 8l-4.02612 3.94305c-.24604.24097-.24604.63526 0 .87622s.64868.24097.89471 0l4.47345-4.38116L11.00001 8l-.44733-.43811z">
        </path>
    </svg>
    <span class="label">
        @if(node.$type==="Folder"){
        <svg version="1.1" fill="currentColor" preserveAspectRatio="xMidYMid meet" viewBox="0 0 16 13" width="1em"
            height="1em">
            <path
                d="M7.94 1.94l-1.214.808A1.5 1.5 0 0 1 5.894 3H0V1.4A1.4 1.4 0 0 1 1.4 0h4.186a1 1 0 0 1 .707.293l1.646 1.646zM9.65 2H14.6A1.4 1.4 0 0 1 16 3.4v8.2a1.4 1.4 0 0 1-1.4 1.4H1.4A1.4 1.4 0 0 1 0 11.6V4h5.894a2.5 2.5 0 0 0 1.387-.42L9.651 2z"
                fill="#ffb238"></path>
        </svg>
        }
        @else if(node.$type==="Component"){
        <svg version="1.1" fill="currentColor" preserveAspectRatio="xMidYMid meet" viewBox="0 0 16 16" width="1em"
            height="1em">
            <path
                d="M16 5v10.589a.421.421 0 0 1-.428.411H.428A.421.421 0 0 1 0 15.589V5h16zM.208 4L3.368.158A.433.433 0 0 1 3.702 0H12.3c.132 0 .253.058.335.158L15.796 4H.207z"
                fill="#758099"></path>
        </svg>
        }
        {{node.label}}
    </span>
    @if (node.loading) { <svg version="1.1" fill="currentColor" preserveAspectRatio="xMidYMid meet" viewBox="0 0 16 16"
        width="1rem" height="1rem">
        <path
            d="M15.438 8.563c-0.311 0-0.563-0.252-0.563-0.563 0-0.928-0.181-1.828-0.541-2.677-0.365-0.85-0.862-1.575-1.473-2.186l-0-0c-0.61-0.612-1.336-1.11-2.142-1.456l-0.044-0.017c-0.847-0.358-1.747-0.539-2.675-0.539-0.311 0-0.563-0.252-0.563-0.563s0.252-0.563 0.563-0.563c1.080 0 2.128 0.211 3.114 0.63 0.953 0.402 1.808 0.98 2.542 1.714s1.311 1.591 1.714 2.542c0.417 0.986 0.628 2.034 0.628 3.114 0.002 0.311-0.25 0.563-0.561 0.563z">
            <animateTransform attributeName="transform" type="rotate" from="0 8 8" to="360 8 8" dur="1s"
                repeatCount="indefinite"></animateTransform>
        </path>
    </svg>}
</div>
@if (node.expanded && node.children?.length) {
<div class="nested-children">
    @for (child of node.children; track child.id) {
    @if(child.$type==="Folder"){
    <app-organizational-tree-node [node]="child" />
    }
    }
</div>
}
