<div class="item-selector-overlay">
    <div class="item-selector-modal">
        <div class="item-selector-modal-header">
            <div class="item-selector-modal-header-title">
                Publish
            </div>
            <div class="item-selector-modal-close" (click)="togglePublishingModal()">
                <div class="modal-header-actions">
                    <svg version="1.1" fill="currentColor" preserveAspectRatio="xMidYMid meet" viewBox="0 0 16 16"
                        width="1em" height="1em">
                        <path
                            d="M9.697 8l5.128-5.128 1.058-1.057a.4.4 0 0 0 0-.566L14.75.117a.4.4 0 0 0-.566 0L8 6.303 1.814.117a.4.4 0 0 0-.565 0L.117 1.248a.4.4 0 0 0 0 .566L6.303 8 .117 14.185a.4.4 0 0 0 0 .566l1.131 1.132a.4.4 0 0 0 .566 0L8 9.697l5.128 5.128 1.057 1.058a.4.4 0 0 0 .566 0l1.132-1.132a.4.4 0 0 0 0-.566L9.697 8z">
                        </path>
                    </svg>
                </div>
            </div>
        </div>
        <div class="item-selector-modal-body">
            <div class="item-selector-modal-main">
                <app-publish-tabs>
                    <app-publish-tab title="General" [component]="generalTab" />
                    <app-publish-tab title="Additional Settings" [component]="additionalSettingsTab" />
                   <!--  <app-publish-tab title="Items to Publish" [component]="publishItemsTab" /> -->
                </app-publish-tabs>
            </div>
        </div>
        <div class="item-selector-modal-footer">

            <div class="modal-footer-btn-group">
                <button
                    [disabled]="!isDisabled() || isPublishing()"
                    (click)="onPublishPage()">{{isPublishing() ? 'Publishing...' : 'Publish'}}</button>
                <button (click)="togglePublishingModal()">Cancel</button>
            </div>
        </div>
    </div>
</div>
