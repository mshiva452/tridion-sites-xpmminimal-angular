<div class="headlessXpmBar">
  <div class="headlessXpmBarContainer">
    <div class="headlessXpmToggle">
      <button (click)="toggleXpmBar()" class="headlessXpmBarButton">
        @if(showXpmBar()){
        <svg version="1.1" fill="currentColor" preserveAspectRatio="xMidYMid meet" viewBox="0 0 16 16" width="1em"
          height="1em">

            d="M9.697 8l5.128-5.128 1.058-1.057a.4.4 0 0 0 0-.566L14.75.117a.4.4 0 0 0-.566 0L8 6.303 1.814.117a.4.4 0 0 0-.565 0L.117 1.248a.4.4 0 0 0 0 .566L6.303 8 .117 14.185a.4.4 0 0 0 0 .566l1.131 1.132a.4.4 0 0 0 .566 0L8 9.697l5.128 5.128 1.057 1.058a.4.4 0 0 0 .566 0l1.132-1.132a.4.4 0 0 0 0-.566L9.697 8z">
          </path>
        </svg>
        } @else {
        <svg version="1.1" fill="currentColor" preserveAspectRatio="xMidYMid meet" viewBox="0 0 16 16" width="1rem"
          height="1rem" color="" #fff>
          <path
            d="M14.8125 3.5625H1.1875C1.13777 3.5625 1.09008 3.54275 1.05492 3.50758C1.01975 3.47242 1 3.42473 1 3.375V2.625C1 2.57527 1.01975 2.52758 1.05492 2.49242C1.09008 2.45725 1.13777 2.4375 1.1875 2.4375H14.8125C14.8622 2.4375 14.9099 2.45725 14.9451 2.49242C14.9802 2.52758 15 2.57527 15 2.625V3.375C15 3.42473 14.9802 3.47242 14.9451 3.50758C14.9099 3.54275 14.8622 3.5625 14.8125 3.5625ZM14.8125 8.5625H1.1875C1.13777 8.5625 1.09008 8.54275 1.05492 8.50758C1.01975 8.47242 1 8.42473 1 8.375V7.625C1 7.57527 1.01975 7.52758 1.05492 7.49242C1.09008 7.45725 1.13777 7.4375 1.1875 7.4375H14.8125C14.8622 7.4375 14.9099 7.45725 14.9451 7.49242C14.9802 7.52758 15 7.57527 15 7.625V8.375C15 8.42473 14.9802 8.47242 14.9451 8.50758C14.9099 8.54275 14.8622 8.5625 14.8125 8.5625ZM14.8125 13.5625H1.1875C1.13777 13.5625 1.09008 13.5427 1.05492 13.5076C1.01975 13.4724 1 13.4247 1 13.375V12.625C1 12.5753 1.01975 12.5276 1.05492 12.4924C1.09008 12.4573 1.13777 12.4375 1.1875 12.4375H14.8125C14.8622 12.4375 14.9099 12.4573 14.9451 12.4924C14.9802 12.5276 15 12.5753 15 12.625V13.375C15 13.4247 14.9802 13.4724 14.9451 13.5076C14.9099 13.5427 14.8622 13.5625 14.8125 13.5625Z">
          </path>
        </svg>
        }
      </button>
    </div>
    @if(showXpmBar()){
    <div class="headlessXpmBarButtonGroup">
      @if(!isAuthenticated())
      {
      <button (click)="signin()" class="headlessXpmBarButton">
        <!-- <span style="font-size: 14px;">Sign in</span> -->
        <svg viewBox="64 64 896 896" focusable="false" width="1em" height="1em" fill="currentColor" aria-hidden="true" style="transform: rotate(270deg);">
          <path
            d="M868 732h-70.3c-4.8 0-9.3 2.1-12.3 5.8-7 8.5-14.5 16.7-22.4 24.5a353.84 353.84 0 01-112.7 75.9A352.8 352.8 0 01512.4 866c-47.9 0-94.3-9.4-137.9-27.8a353.84 353.84 0 01-112.7-75.9 353.28 353.28 0 01-76-112.5C167.3 606.2 158 559.9 158 512s9.4-94.2 27.8-137.8c17.8-42.1 43.4-80 76-112.5s70.5-58.1 112.7-75.9c43.6-18.4 90-27.8 137.9-27.8 47.9 0 94.3 9.3 137.9 27.8 42.2 17.8 80.1 43.4 112.7 75.9 7.9 7.9 15.3 16.1 22.4 24.5 3 3.7 7.6 5.8 12.3 5.8H868c6.3 0 10.2-7 6.7-12.3C798 160.5 663.8 81.6 511.3 82 271.7 82.6 79.6 277.1 82 516.4 84.4 751.9 276.2 942 512.4 942c152.1 0 285.7-78.8 362.3-197.7 3.4-5.3-.4-12.3-6.7-12.3zm88.9-226.3L815 393.7c-5.3-4.2-13-.4-13 6.3v76H488c-4.4 0-8 3.6-8 8v56c0 4.4 3.6 8 8 8h314v76c0 6.7 7.8 10.5 13 6.3l141.9-112a8 8 0 000-12.6z">
          </path>
        </svg>
      </button>
      } @else {
      @if(pageLink()){
      <button [ngClass]="['headlessXpmBarButton', showPageEditMode() ? 'headlessXpmBarButtonActive' : '']"
        title="Edit Page" (click)="onUpdateXpmPage()">
        <svg viewBox="64 64 896 896" focusable="false" data-icon="form" width="1em" height="1em" fill="currentColor"
          aria-hidden="true">
          <path
            d="M904 512h-56c-4.4 0-8 3.6-8 8v320H184V184h320c4.4 0 8-3.6 8-8v-56c0-4.4-3.6-8-8-8H144c-17.7 0-32 14.3-32 32v736c0 17.7 14.3 32 32 32h736c17.7 0 32-14.3 32-32V520c0-4.4-3.6-8-8-8z">
          </path>
          <path
            d="M355.9 534.9L354 653.8c-.1 8.9 7.1 16.2 16 16.2h.4l118-2.9c2-.1 4-.9 5.4-2.3l415.9-415c3.1-3.1 3.1-8.2 0-11.3L785.4 114.3c-1.6-1.6-3.6-2.3-5.7-2.3s-4.1.8-5.7 2.3l-415.8 415a8.3 8.3 0 00-2.3 5.6zm63.5 23.6L779.7 199l45.2 45.1-360.5 359.7-45.7 1.1.7-46.4z">
          </path>
        </svg>
      </button>
      }

      <button [ngClass]="['headlessXpmBarButton', isXpmEnabled() ? 'headlessXpmBarButtonActive' : '']"
        title="Edit Components" (click)="onUpdateXpm()">
        <svg viewBox="64 64 896 896" focusable="false" data-icon="edit" width="1em" height="1em" fill="currentColor"
          aria-hidden="true">
          <path
            d="M257.7 752c2 0 4-.2 6-.5L431.9 722c2-.4 3.9-1.3 5.3-2.8l423.9-423.9a9.96 9.96 0 000-14.1L694.9 114.9c-1.9-1.9-4.4-2.9-7.1-2.9s-5.2 1-7.1 2.9L256.8 538.8c-1.5 1.5-2.4 3.3-2.8 5.3l-29.5 168.2a33.5 33.5 0 009.4 29.8c6.6 6.4 14.9 9.9 23.8 9.9zm67.4-174.4L687.8 215l73.3 73.3-362.7 362.6-88.9 15.7 15.6-89zM880 836H144c-17.7 0-32 14.3-32 32v36c0 4.4 3.6 8 8 8h784c4.4 0 8-3.6 8-8v-36c0-17.7-14.3-32-32-32z">
          </path>
        </svg>

          height="1em">
          <path
            d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0zm6.959 8.176l-1.382-.346a.257.257 0 0 1-.153-.107l-.58-.87a.26.26 0 0 1 0-.287l.632-.948a.252.252 0 0 1 .1-.087l.772-.386c.395.872.62 1.837.62 2.855 0 .06-.008.117-.01.176zM1.032 8c0-.385.04-.759.1-1.127.23.342.468.692.642.947.19.28.413.536.69.785.346.313.728.576 1.134.78.446.225 1.099.579 1.557.833.163.09.265.263.265.45v1.034c0 .413.161.802.453 1.094.409.409.61 1.022.579 1.289v.703C3.353 14.082 1.032 11.31 1.032 8zm6.45 6.942l-.003-.789c.08-.6-.305-1.515-.876-2.087a.521.521 0 0 1-.152-.364v-1.033c0-.564-.305-1.083-.797-1.354a54.36 54.36 0 0 0-1.592-.852 4.183 4.183 0 0 1-.933-.647 3.237 3.237 0 0 1-.502-.577c-.312-.458-.824-1.217-1.142-1.689a6.986 6.986 0 0 1 5.147-4.382l1.67 1.67-.484.486a.775.775 0 0 0-.03 1.062l-.185.001a.772.772 0 0 0-.54.22l-.32.31a.769.769 0 0 0-.152.902l.129.257a1.033 1.033 0 0 0-.711-.02l-1.006.334a.9.9 0 0 0-.118 1.662l.358.179c.346.173.73.27 1.117.284.076.074.201.243.28.35.19.261.371.508.613.629l.109.054h2.275c.136 0 .27.055.365.152l.442.441a.473.473 0 0 1 .137.332.99.99 0 0 1-.293.698l-.365.366c-.16.16-.273.359-.331.577l-.036.142c-.03.119-.06.238-.103.355l-.864 2.328c-.194.016-.39.03-.589.03-.175-.001-.347-.015-.519-.027zm2.284-.21l.653-1.761c.058-.152.098-.308.137-.464l.034-.13c.01-.042.034-.082.132-.18l.296-.296c.378-.375.595-.896.595-1.43 0-.394-.16-.78-.44-1.06l-.441-.442a1.559 1.559 0 0 0-1.095-.453H7.671c-.061-.072-.14-.18-.198-.26-.265-.362-.566-.772-1.021-.772-.258 0-.517-.061-.747-.177l-.076-.037.707-.236.3.26c.14.122.32.19.506.19h.183c.27 0 .516-.137.658-.368a.768.768 0 0 0 .034-.752L7.6 5.526l.11-.106h.185a.77.77 0 0 0 .547-.227l.258-.258a.775.775 0 0 0 .03-1.063l.304-.303a1.028 1.028 0 0 0 0-1.46L7.958 1.035l.043-.002a6.963 6.963 0 0 1 5.855 3.204l-.741.371c-.2.1-.372.251-.496.438l-.632.948c-.29.435-.29.997 0 1.432l.58.87c.178.267.447.457.76.536l1.529.382a6.981 6.981 0 0 1-5.09 5.518z">
          </path>
        </svg>
      </button>
      <button (click)="signout()" class="headlessXpmBarButton" title="logout">
        <svg version="1.1" fill="currentColor" preserveAspectRatio="xMidYMid meet" viewBox="0 0 16 12" width="1em"
          height="1em">
          <path
            d="M1.5 0h4.124c.206 0 .375.169.375.375v.25A.376.376 0 0 1 5.624 1H1.5c-.275 0-.5.225-.5.5v9c0 .275.225.5.5.5h4.124c.206 0 .375.169.375.375v.25a.376.376 0 0 1-.375.375H1.5A1.5 1.5 0 0 1 0 10.5v-9A1.5 1.5 0 0 1 1.5 0zm8.716.61L9.994.83a.375.375 0 0 0 0 .531l4.124 4.107H5.374a.376.376 0 0 0-.375.375v.312c0 .207.168.375.375.375h8.744l-4.12 4.106a.375.375 0 0 0 0 .532l.221.222a.375.375 0 0 0 .532 0l5.139-5.125a.375.375 0 0 0 0-.532L10.747.61a.375.375 0 0 0-.53 0z">
          </path>
        </svg>
      </button>
      }
    </div>}
  </div>
</div>
@if(showPageInfo()){
<app-page-info (togglePageInfo)="togglePageInfo()"></app-page-info>
}
@if(showPublishModal()){
<app-publish-page-modal />
}
